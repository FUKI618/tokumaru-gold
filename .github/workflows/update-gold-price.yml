name: Update Gold Price

on:
  schedule:
    # 毎朝9時JST（UTC 0:00）に実行、平日のみ
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 手動実行も可能

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch and update gold price
        run: bun run scripts/update-gold-price.ts

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/data/goldPrice.ts public/goldPrice.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/goldPrice.ts public/goldPrice.json
          git commit -m "金相場自動更新: $(date -u +%Y-%m-%d)"
          git push
